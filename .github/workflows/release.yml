name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

      - run: npm run build:package

      - run: npm run zip

      - name: Create versioned release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}+$(date -u '+%Y%m%d.%H%M%S')"
          ZIP=$(ls .output/*.zip)
          gh release create "$TAG" "$ZIP" \
            --title "$TAG" \
            --notes "Built from $(git rev-parse --short HEAD)" \
            --latest

      - name: Update stable download link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ZIP=$(ls .output/*.zip)
          cp "$ZIP" .output/csm-dev-wallet.zip
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true
          gh release create latest .output/csm-dev-wallet.zip \
            --title "Latest (v${VERSION})" \
            --notes "Always points to the latest build. [Download](https://github.com/exromany/csm-dev-wallet/releases/download/latest/csm-dev-wallet.zip)" \
            --prerelease

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "csm-dev-wallet@${VERSION}" version 2>/dev/null; then
            echo "v${VERSION} already published, skipping"
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
